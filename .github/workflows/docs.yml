name: API docs

# Validate that the API reference still builds (JSDoc for the web app + pdoc for
# the Python pipeline) on pull requests, and upload it as a downloadable preview
# artifact. The live docs are published to GitHub Pages under /docs/api/ by
# deploy-pages.yml on main — this workflow only build-checks, it never deploys.

on:
  pull_request:
    branches: [main]
    paths:
      - "scraper/web_template/**"
      - "scraper/*.py"
      - "jsdoc.json"
      - "package.json"
      - "scripts/**"
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          npm install
          python -m pip install -r scraper/requirements-dev.txt

      - name: Build API reference (JSDoc + pdoc)
        run: npm run docs

      - name: Upload docs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: api-docs
          path: docs/api
          if-no-files-found: error
