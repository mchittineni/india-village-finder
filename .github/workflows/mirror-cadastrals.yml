name: mirror-cadastrals

# Mirrors the Andhra Pradesh cadastral PMTiles from the upstream community
# release to a Cloudflare R2 bucket (S3-compatible) that serves range requests
# WITH CORS — which the GitHub release URL does not. Run this in CI rather than
# on a laptop: it downloads and re-uploads ~850 MB.
#
# Manual only. After the first successful run, point the app at the bucket by
# editing scraper/pipeline.py -> STATES[28]["cadastre"]["url"] (a reviewed
# change; this workflow deliberately does not rewrite the URL).
#
# Required repo secrets:
#   R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET

on:
  workflow_dispatch:
    inputs:
      asset_url:
        description: Upstream PMTiles URL to mirror
        default: https://github.com/ramSeraph/indian_cadastrals/releases/download/andhra-pradesh/APSAC_AP_Cadastrals.pmtiles
        required: true
      object_key:
        description: Destination object key in the R2 bucket
        default: APSAC_AP_Cadastrals.pmtiles
        required: true

# No repo write access needed; secrets are injected at the job level.
permissions:
  contents: read

concurrency:
  group: mirror-cadastrals
  cancel-in-progress: false

jobs:
  mirror:
    name: mirror to R2
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      BUCKET: ${{ secrets.R2_BUCKET }}
      ASSET_URL: ${{ inputs.asset_url }}
      OBJECT_KEY: ${{ inputs.object_key }}
    steps:
      - name: Verify secrets are configured
        run: |
          missing=
          for s in R2_ACCOUNT_ID R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_BUCKET; do
            case "$s" in
              R2_ACCOUNT_ID)        v='${{ secrets.R2_ACCOUNT_ID }}' ;;
              R2_ACCESS_KEY_ID)     v='${{ secrets.R2_ACCESS_KEY_ID }}' ;;
              R2_SECRET_ACCESS_KEY) v='${{ secrets.R2_SECRET_ACCESS_KEY }}' ;;
              R2_BUCKET)            v='${{ secrets.R2_BUCKET }}' ;;
            esac
            [ -n "$v" ] || missing="$missing $s"
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing (see docs/cadastral-hosting.md)"
            exit 1
          fi

      - name: Download PMTiles from upstream
        run: |
          curl -fSL --retry 3 -o cadastrals.pmtiles "$ASSET_URL"
          # Sanity check: PMTiles files start with the ASCII magic "PMTiles".
          head -c 7 cadastrals.pmtiles | grep -q "PMTiles" \
            || { echo "::error::Downloaded file is not a PMTiles archive"; exit 1; }
          ls -lh cadastrals.pmtiles

      - name: Upload to R2
        run: |
          aws s3 cp cadastrals.pmtiles "s3://$BUCKET/$OBJECT_KEY" \
            --endpoint-url "$R2_ENDPOINT" \
            --checksum-algorithm CRC32 \
            --content-type application/octet-stream

      - name: Apply CORS policy to bucket
        run: |
          cat > cors.json <<'JSON'
          {
            "CORSRules": [
              {
                "AllowedOrigins": ["*"],
                "AllowedMethods": ["GET", "HEAD"],
                "AllowedHeaders": ["Range"],
                "ExposeHeaders": ["Content-Range", "Content-Length", "Accept-Ranges", "ETag"],
                "MaxAgeSeconds": 86400
              }
            ]
          }
          JSON
          aws s3api put-bucket-cors --bucket "$BUCKET" \
            --endpoint-url "$R2_ENDPOINT" \
            --cors-configuration file://cors.json

      - name: Summary
        run: |
          echo "### Mirrored \`$OBJECT_KEY\` to R2 bucket \`$BUCKET\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Next: set the bucket's public/custom-domain URL in" >> "$GITHUB_STEP_SUMMARY"
          echo "\`scraper/pipeline.py\` (STATES[28].cadastre.url) and rebuild." >> "$GITHUB_STEP_SUMMARY"
