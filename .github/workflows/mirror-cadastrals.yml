name: mirror-cadastrals

# Mirrors each state's cadastral PMTiles from the upstream community releases
# (ramSeraph/indian_cadastrals — the only open, CC0 source of the vectorised,
# survey-numbered parcels; the state GIS servers serve vectors only behind a
# login) to a Cloudflare R2 bucket (S3-compatible) that answers range requests
# WITH CORS — which the GitHub release URLs do not.
#
# States mirrored (see the matrix below):
#   andhra-pradesh  APSAC_AP_Cadastrals.pmtiles       (~848 MB)
#   telangana       TRACGIS_Bhunaksha_Cadastrals.pmtiles (~649 MB)
#   karnataka       KGISMAPS_KN_Cadastrals.pmtiles    (~1042 MB)
#
# Auto-tracking: runs weekly and re-mirrors a state only when its upstream
# asset's updated_at/size actually changes (the cadastre is refreshed rarely),
# so most legs are no-ops. Manual dispatch can target one state or all, and
# `force` re-mirrors regardless.
#
# The public bucket URL is wired into scraper/config.py (STATES[*].cadastre.url)
# as an explicit, reviewed change — this workflow deliberately does not rewrite
# it. CORS is a one-time bucket setting (see the CORS step / docs) and does not
# need an admin-scoped token for the recurring transfer.
#
# Required repo secrets:
#   R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET

on:
  schedule:
    - cron: "0 4 * * 1" # weekly, Mon 04:00 UTC — re-mirror only if upstream moved
  workflow_dispatch:
    inputs:
      only_state:
        description: Which state to mirror
        type: choice
        options:
          - all
          - andhra-pradesh
          - telangana
          - karnataka
        default: all
      force:
        description: Re-mirror even if upstream is unchanged
        type: boolean
        default: false

# Read-only repo scope; GITHUB_TOKEN just reads the upstream public releases.
# R2 credentials are injected as secrets at the job level.
permissions:
  contents: read

jobs:
  mirror:
    name: mirror ${{ matrix.state }} to R2
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # one state's outage must not cancel the others
      matrix:
        include:
          - state: andhra-pradesh
            asset: APSAC_AP_Cadastrals.pmtiles
          - state: telangana
            asset: TRACGIS_Bhunaksha_Cadastrals.pmtiles
          - state: karnataka
            asset: KGISMAPS_KN_Cadastrals.pmtiles
    concurrency:
      group: mirror-cadastrals-${{ matrix.state }}
      cancel-in-progress: false
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      BUCKET: ${{ secrets.R2_BUCKET }}
      ASSET_URL: https://github.com/ramSeraph/indian_cadastrals/releases/download/${{ matrix.state }}/${{ matrix.asset }}
      OBJECT_KEY: ${{ matrix.asset }}
      FORCE: ${{ github.event.inputs.force || 'false' }}
      STATE: ${{ matrix.state }}
      ONLY_STATE: ${{ github.event.inputs.only_state || 'all' }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Verify secrets are configured
        run: |
          missing=
          for s in R2_ACCOUNT_ID R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_BUCKET; do
            case "$s" in
              R2_ACCOUNT_ID)        v='${{ secrets.R2_ACCOUNT_ID }}' ;;
              R2_ACCESS_KEY_ID)     v='${{ secrets.R2_ACCESS_KEY_ID }}' ;;
              R2_SECRET_ACCESS_KEY) v='${{ secrets.R2_SECRET_ACCESS_KEY }}' ;;
              R2_BUCKET)            v='${{ secrets.R2_BUCKET }}' ;;
            esac
            [ -n "$v" ] || missing="$missing $s"
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing (see docs/cadastral-hosting.md)"
            exit 1
          fi

      # Read the upstream asset's updated_at + size from the GitHub release API
      # (no download) to drive change-detection.
      - name: Resolve upstream release metadata
        id: up
        run: |
          rest="${ASSET_URL#https://github.com/}"
          owner=$(echo "$rest" | cut -d/ -f1)
          repo=$(echo "$rest"  | cut -d/ -f2)
          tag=$(echo "$rest"   | cut -d/ -f5)
          name=$(echo "$rest"  | cut -d/ -f6)
          meta=$(gh api "repos/$owner/$repo/releases/tags/$tag" \
            --jq ".assets[] | select(.name==\"$name\") | \"\(.updated_at) \(.size)\"")
          up_updated=$(echo "$meta" | awk '{print $1}')
          up_size=$(echo "$meta" | awk '{print $2}')
          echo "Upstream $owner/$repo@$tag/$name: updated=$up_updated size=$up_size"
          [ -n "$up_updated" ] || { echo "::error::asset $name not found in $tag release"; exit 1; }
          echo "updated=$up_updated" >> "$GITHUB_OUTPUT"
          echo "size=$up_size"       >> "$GITHUB_OUTPUT"

      # Compare against the version already in R2 (stored in object metadata).
      # Skip the whole transfer when unchanged and not forced.
      - name: Decide whether to re-mirror
        id: decide
        run: |
          # Manual dispatch may target a single state — skip the other legs.
          if [ "$ONLY_STATE" != "all" ] && [ "$ONLY_STATE" != "$STATE" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "$STATE not selected (only_state=$ONLY_STATE) — skipping."
            exit 0
          fi
          cur=$(aws s3api head-object --bucket "$BUCKET" --key "$OBJECT_KEY" \
            --endpoint-url "$R2_ENDPOINT" \
            --query 'Metadata."upstream-updated-at"' --output text 2>/dev/null || echo "")
          up='${{ steps.up.outputs.updated }}'
          echo "R2 has upstream-updated-at=$cur ; upstream=$up ; force=$FORCE"
          if [ "$FORCE" != "true" ] && [ -n "$up" ] && [ "$cur" = "$up" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "\`$OBJECT_KEY\`: up to date — skipping (upstream unchanged)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download PMTiles from upstream
        if: steps.decide.outputs.run == 'true'
        run: |
          curl -fSL --retry 3 -o cadastrals.pmtiles "$ASSET_URL"
          # Sanity check: PMTiles files start with the ASCII magic "PMTiles".
          head -c 7 cadastrals.pmtiles | grep -q "PMTiles" \
            || { echo "::error::Downloaded file is not a PMTiles archive"; exit 1; }
          # If we know the upstream size, verify the download is complete.
          up_size='${{ steps.up.outputs.size }}'
          got=$(stat -c %s cadastrals.pmtiles)
          if [ -n "$up_size" ] && [ "$up_size" != "$got" ]; then
            echo "::error::size mismatch: upstream $up_size, downloaded $got"; exit 1
          fi
          ls -lh cadastrals.pmtiles

      - name: Upload to R2
        if: steps.decide.outputs.run == 'true'
        run: |
          aws s3 cp cadastrals.pmtiles "s3://$BUCKET/$OBJECT_KEY" \
            --endpoint-url "$R2_ENDPOINT" \
            --checksum-algorithm CRC32 \
            --content-type application/octet-stream \
            --metadata "upstream-updated-at=${{ steps.up.outputs.updated }},upstream-size=${{ steps.up.outputs.size }}"

      # CORS is a one-time, bucket-level setting. A least-privilege (Object Read &
      # Write) R2 token — the right scope for this recurring transfer — CANNOT set
      # it (PutBucketCors needs an Admin token), so this step is best-effort: it
      # keeps the policy in sync when run with an admin token, and otherwise just
      # warns. Set CORS once via the R2 dashboard (see docs/cadastral-hosting.md).
      - name: Apply CORS policy to bucket (best-effort)
        if: steps.decide.outputs.run == 'true'
        continue-on-error: true
        run: |
          cat > cors.json <<'JSON'
          {
            "CORSRules": [
              {
                "AllowedOrigins": ["*"],
                "AllowedMethods": ["GET", "HEAD"],
                "AllowedHeaders": ["Range"],
                "ExposeHeaders": ["Content-Range", "Content-Length", "Accept-Ranges", "ETag"],
                "MaxAgeSeconds": 86400
              }
            ]
          }
          JSON
          if aws s3api put-bucket-cors --bucket "$BUCKET" \
               --endpoint-url "$R2_ENDPOINT" \
               --cors-configuration file://cors.json; then
            echo "CORS policy applied."
          else
            echo "::warning::Could not set CORS (object-scoped token can't call PutBucketCors)."
            echo "Set it once in the R2 dashboard — see docs/cadastral-hosting.md."
          fi

      - name: Summary
        if: steps.decide.outputs.run == 'true'
        run: |
          echo "### Mirrored \`$OBJECT_KEY\` to R2 bucket \`$BUCKET\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Upstream updated_at: \`${{ steps.up.outputs.updated }}\` (${{ steps.up.outputs.size }} bytes)" >> "$GITHUB_STEP_SUMMARY"
