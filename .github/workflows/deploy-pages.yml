name: Deploy to GitHub Pages

# Publishes the site to GitHub Pages: the per-state apps at the root, plus the
# generated API reference (JSDoc + pdoc) under /docs/api/. A repo has a single
# Pages site, so the docs ride along as a subpath rather than a second site.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install docs tooling
        run: |
          npm install
          python -m pip install -r scraper/requirements-dev.txt

      - name: Build API reference (JSDoc + pdoc)
        run: npm run docs

      - name: Trim build-only files from the publish root
        run: |
          rm -rf node_modules package-lock.json
          find . -type d -name __pycache__ -prune -exec rm -rf {} +

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
