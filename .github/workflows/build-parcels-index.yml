name: build-parcels-index

# Regenerates <slug>/web/data/parcels_index.json — the village -> parcel bbox
# lookup that lets the map jump precisely to a village's land parcels. The scan
# reads the whole-state cadastral PMTiles (~850 MB, thousands of tiles), so it
# runs here rather than on a laptop. Opens a PR with the refreshed index rather
# than pushing to main.

on:
  workflow_dispatch:
    inputs:
      slug:
        description: State slug
        default: andhra_pradesh
        required: true
      pmtiles_url:
        description: Cadastral PMTiles URL to scan
        default: https://github.com/ramSeraph/indian_cadastrals/releases/download/andhra-pradesh/APSAC_AP_Cadastrals.pmtiles
        required: true
      source_layer:
        description: Vector layer id inside the PMTiles
        default: APSAC_AP_Cadastrals
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: build-parcels-index-${{ inputs.slug }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      SLUG: ${{ inputs.slug }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pmtiles mapbox-vector-tile shapely

      - name: Download cadastral PMTiles
        run: |
          mkdir -p scraper/.cache/cadastrals
          curl -fSL --retry 3 -o scraper/.cache/cadastrals/cad.pmtiles "${{ inputs.pmtiles_url }}"
          head -c 7 scraper/.cache/cadastrals/cad.pmtiles | grep -q PMTiles \
            || { echo "::error::Not a PMTiles archive"; exit 1; }

      - name: Build parcels index
        run: |
          python scraper/build_parcels_index.py \
            --slug "$SLUG" \
            --pmtiles scraper/.cache/cadastrals/cad.pmtiles \
            --source-layer "${{ inputs.source_layer }}"

      - name: Open PR if the outputs changed
        run: |
          files="$SLUG/web/data/parcels_index.json $SLUG/web/data/village_points.json"
          if git diff --quiet -- $files; then
            echo "No change in $files"; exit 0
          fi
          branch="chore/parcels-index-$SLUG-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add $files
          git commit -m "chore(cadastral): refresh parcels index + village points for $SLUG"
          git push -u origin "$branch"
          gh pr create --fill \
            --title "chore(cadastral): refresh parcels index + points for $SLUG" \
            --body "Automated refresh of the parcel bbox index and village points from the cadastral PMTiles. Generated by the build-parcels-index workflow."
