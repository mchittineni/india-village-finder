name: Labeler

# Automatically apply labels to a pull request based on which files it changes.
# Configuration: .github/labeler.yml
#
# Uses pull_request_target so the label-writing token has the right permissions
# even for fork PRs; the labeler reads the trusted config from the base branch
# and never runs PR code, so this is safe.
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Apply path-based labels
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
