name: build-boundary-tiles

# Rebuilds tiles/boundaries.pmtiles (the all-state boundary vector tiles) and the
# per-state boundary_bounds.json indexes from the committed simplified GeoJSON,
# then opens a reviewed PR. Boundaries change rarely, so this runs monthly (after
# the monthly boundary refresh lands) and on demand — the tiling itself is light,
# but tippecanoe must be built from source here, so it lives in CI.

on:
  schedule:
    - cron: "0 6 1 * *" # monthly — 1st 06:00 UTC (after the 03:00 boundaries refresh)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: build-boundary-tiles
  cancel-in-progress: false

env:
  TIPPECANOE_TAG: "2.79.0"

jobs:
  tiles:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Build tippecanoe from source (pinned tag)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libsqlite3-dev zlib1g-dev
          git clone --depth 1 --branch "$TIPPECANOE_TAG" \
            https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          make -C /tmp/tippecanoe -j"$(nproc)"
          sudo make -C /tmp/tippecanoe install
          tippecanoe --version

      - name: Build boundary tiles + bounds indexes
        run: python scraper/build_boundary_tiles.py

      - name: Open PR if outputs changed
        run: |
          # status --porcelain (not `git diff`) so brand-new untracked outputs
          # (first run) are detected too.
          files="tiles/boundaries.pmtiles */web/data/boundary_bounds.json"
          if [ -z "$(git status --porcelain -- $files)" ]; then
            echo "No change to boundary tiles."; exit 0
          fi
          branch="chore/boundary-tiles-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add $files
          git commit -m "chore(map): rebuild boundary vector tiles + bounds indexes"
          git push -u origin "$branch"
          gh pr create --fill \
            --title "chore(map): rebuild boundary vector tiles" \
            --body "Regenerated \`tiles/boundaries.pmtiles\` and the per-state \`boundary_bounds.json\` from the committed simplified boundary GeoJSON (tippecanoe $TIPPECANOE_TAG). Generated by the build-boundary-tiles workflow."
