name: data-validation

on:
  pull_request:
  push:
    branches: [main]

  workflow_dispatch:

# Least-privilege default token: this workflow runs untrusted fork-PR code
# (pytest + node eval on the PR checkout) and only needs to read the repo.
permissions:
  contents: read

jobs:
  data-validation:
    name: data-validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r scraper/requirements-dev.txt

      - name: Validate data (pytest)
        run: python -m pytest scraper/tests -v

      - name: Transliteration accuracy (regression guard)
        run: node scraper/translit_eval.mjs --check
