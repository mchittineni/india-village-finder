name: "🐛 Bug report"
description: Something in the map or search isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report this! The more detail, the faster we can fix it."
  - type: dropdown
    id: area
    attributes:
      label: Where did it happen?
      options:
        - Andhra Pradesh map
        - Telangana map
        - Landing page
        - Search
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong? Steps to reproduce help a lot.
      placeholder: "I searched for 'X', clicked the result, and the map didn't move…"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
  - type: input
    id: url
    attributes:
      label: Page URL (if relevant)
      placeholder: https://mchittineni.github.io/india-village-finder/...
  - type: input
    id: env
    attributes:
      label: Browser & device
      placeholder: "Chrome on Android / Safari on iPhone / Firefox on Windows…"
